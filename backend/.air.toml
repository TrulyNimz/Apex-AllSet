root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  bin          = "./tmp/apex-api"
  cmd          = "go build -o ./tmp/apex-api ./cmd/server"
  delay        = 1000
  exclude_dir  = ["assets", "tmp", "vendor", "testdata"]
  exclude_regex = ["_test.go"]
  include_ext  = ["go"]
  log          = "build-errors.log"
  stop_on_error = false

[color]
  build  = "yellow"
  main   = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false
