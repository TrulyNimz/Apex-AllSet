version: "3.9"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  apex-internal:
    driver: bridge
  apex-public:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  pgadmin-data:

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-apex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apex_dev_secret}
      POSTGRES_DB:       ${DB_NAME:-apex_trading}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-apex} -d ${DB_NAME:-apex_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-1.0.0}
    container_name: apex-backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV:      ${APP_ENV:-development}
      DB_HOST:      postgres
      DB_PORT:      5432
      REDIS_HOST:   redis
      REDIS_PORT:   6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - apex-internal
      - apex-public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:     ${VITE_API_URL:-http://localhost:8080}
        VITE_WS_URL:      ${VITE_WS_URL:-ws://localhost:8080}
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: apex-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - apex-internal
      - apex-public

  # ── PgAdmin (dev tool — remove in production) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: apex-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@apextrading.io
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - apex-internal
    profiles:
      - dev-tools  # only starts with: docker compose --profile dev-tools up

  # ── Redis Commander (dev tool) ────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: apex-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS:     local:redis:6379:0:${REDIS_PASSWORD:-redis_dev_secret}
      HTTP_USER:       admin
      HTTP_PASSWORD:   ${REDIS_UI_PASSWORD:-admin}
    ports:
      - "8081:8081"
    networks:
      - apex-internal
    profiles:
      - dev-tools
    depends_on:
      - redis
