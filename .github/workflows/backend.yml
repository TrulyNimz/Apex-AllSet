name: Backend CI

on:
  push:
    branches: [main]
    paths:    ['backend/**']
  pull_request:
    branches: [main]
    paths:    ['backend/**']

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     apex
          POSTGRES_PASSWORD: apex_test_secret
          POSTGRES_DB:       apex_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U apex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      CGO_ENABLED: 0
      DB_HOST:     localhost
      DB_PORT:     5432
      DB_USER:     apex
      DB_PASSWORD: apex_test_secret
      DB_NAME:     apex_test
      DB_SSLMODE:  disable
      REDIS_HOST:  localhost
      REDIS_PORT:  6379
      REDIS_PASSWORD: ""
      JWT_ACCESS_SECRET:  test_access_secret_minimum_32_characters_ok
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters_!
      JWT_ACCESS_TTL:     15m
      JWT_REFRESH_TTL:    168h
      APP_ENV:     test
      APP_PORT:    8080

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  docker:
    name: Docker Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apex-backend:latest
            ghcr.io/${{ github.repository_owner }}/apex-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/apex-backend:latest
            cd /opt/apex
            docker compose up -d --no-deps backend
            docker system prune -f --filter "until=24h"
