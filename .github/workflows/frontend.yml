name: Frontend CI

on:
  push:
    branches: [main]
    paths:    ['frontend/**']
  pull_request:
    branches: [main]
    paths:    ['frontend/**']

jobs:
  build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ''
          VITE_WS_URL:  ''

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     apex
          POSTGRES_PASSWORD: apex_test_secret
          POSTGRES_DB:       apex_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U apex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          docker build -t apex-backend:ci .
          docker run -d --name apex-backend \
            --network host \
            -e APP_ENV=test -e APP_PORT=8080 \
            -e DB_HOST=localhost -e DB_PORT=5432 \
            -e DB_USER=apex -e DB_PASSWORD=apex_test_secret -e DB_NAME=apex_test -e DB_SSLMODE=disable \
            -e REDIS_HOST=localhost -e REDIS_PORT=6379 -e REDIS_PASSWORD="" \
            -e JWT_ACCESS_SECRET=test_access_secret_minimum_32_characters_ok \
            -e JWT_REFRESH_SECRET=test_refresh_secret_minimum_32_chars_!! \
            -e JWT_ACCESS_TTL=15m -e JWT_REFRESH_TTL=168h \
            apex-backend:ci

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:5173

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  docker:
    name: Docker Push & Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apex-frontend:latest
            ghcr.io/${{ github.repository_owner }}/apex-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/apex-frontend:latest
            cd /opt/apex
            docker compose up -d --no-deps frontend
            docker system prune -f --filter "until=24h"
